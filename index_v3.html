<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>아산·인주 방문관리 v3</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,'Noto Sans KR',sans-serif;background:#eef2f6;color:#111}
header{background:#1565c0;color:#fff;text-align:center;padding:16px;font-size:23px;font-weight:800}
.wrap{max-width:760px;margin:0 auto;padding:14px}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 3px 12px rgba(0,0,0,.14)}
.area{font-size:21px;font-weight:800;color:#1565c0;text-align:center;margin-bottom:6px}
.houseNo{font-size:64px;font-weight:900;text-align:center;line-height:1.05;margin:10px 0;color:#111;letter-spacing:-2px}
.name{text-align:center;font-size:22px;font-weight:800;margin-bottom:4px}
.addr{text-align:center;font-size:18px;color:#333;margin-bottom:12px}
#map{height:310px;border-radius:14px;border:1px solid #d5dce5;overflow:hidden;margin-top:10px}
.infoGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.infoBox{background:#f3f6fa;border-radius:12px;padding:12px;text-align:center;font-weight:800;font-size:18px}
.infoBox small{display:block;font-size:13px;color:#555;margin-bottom:3px}
.direction{font-size:34px;line-height:1}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{border:0;border-radius:12px;padding:16px;font-size:18px;font-weight:800;color:#fff;cursor:pointer}
.done{background:#2e7d32}.absent{background:#f57c00}.reject{background:#c62828}.revisit{background:#6a1b9a}
.nav{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.nav button{background:#1565c0}
.utility{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.utility button{background:#455a64;font-size:16px;padding:13px}
.progressText{font-size:18px;font-weight:800;margin-bottom:8px}.bar{height:18px;background:#e0e0e0;border-radius:20px;overflow:hidden}.barFill{height:100%;background:#1565c0;width:0%}
.memo{width:100%;min-height:70px;border:1px solid #ccc;border-radius:12px;padding:12px;font-size:17px;margin-top:10px}
.menu{display:none}.menu.open{display:block}.menu button{background:#37474f;width:100%;margin-top:8px;text-align:left}
.notice{font-size:14px;color:#555;line-height:1.5;margin-top:8px}
@media(max-width:480px){.houseNo{font-size:56px}#map{height:270px}.btns{grid-template-columns:1fr}header{font-size:21px}}
</style>
</head>
<body>
<header>아산·인주 방문관리 v3</header>
<div class="wrap">
  <div class="card">
    <div class="area" id="areaName">걸매리</div>
    <div class="houseNo" id="houseNo">1181-35</div>
    <div class="name" id="houseName">여원 다육이</div>
    <div class="addr" id="address">인주면 현대로 1181-35</div>
    <div id="map"></div>
    <div class="infoGrid">
      <div class="infoBox"><small>거리</small><span id="distance">GPS 대기</span></div>
      <div class="infoBox"><small>방향</small><span class="direction" id="direction">●</span><span id="directionText"> 확인중</span></div>
    </div>
    <div class="utility">
      <button onclick="startGps()">📍 내 위치 켜기</button>
      <button onclick="openNaverMap()">🗺️ 지도 크게 보기</button>
    </div>
    <div class="notice">※ 처음 사용할 때 위치 허용을 눌러야 내 위치와 다음 집 방향이 표시됩니다.</div>
  </div>

  <div class="card">
    <div class="btns">
      <button class="done" onclick="setStatus('방문완료')">방문완료</button>
      <button class="absent" onclick="setStatus('부재')">부재</button>
      <button class="reject" onclick="setStatus('방문거절')">방문거절</button>
      <button class="revisit" onclick="setStatus('재방문')">재방문</button>
    </div>
    <textarea class="memo" id="memo" placeholder="메모: 예) 다시 방문, 초인종 없음, 차량 주차 가능"></textarea>
    <div class="nav">
      <button onclick="prevHouse()">◀ 이전집</button>
      <button onclick="nextHouse()">다음집 ▶</button>
    </div>
  </div>

  <div class="card">
    <div class="progressText" id="progressText">진행률 0 / 0</div>
    <div class="bar"><div class="barFill" id="barFill"></div></div>
  </div>

  <div class="card">
    <button style="background:#263238;width:100%" onclick="toggleMenu()">☰ 관리자 메뉴</button>
    <div class="menu" id="menu">
      <button onclick="resetToday()">오늘 기록 초기화</button>
      <button onclick="alert(summaryText())">오늘 통계 보기</button>
    </div>
  </div>
</div>

<script>
const houses = [
  {area:'걸매리', no:'1181-35', name:'여원 다육이', addr:'인주면 현대로 1181-35', lat:36.87178, lng:126.89856},
  {area:'걸매리', no:'1181-40', name:'동화기업', addr:'인주면 현대로 1181-40', lat:36.87143, lng:126.89915},
  {area:'걸매리', no:'1181-11', name:'한솔티씨에스', addr:'인주면 현대로 1181-11', lat:36.87205, lng:126.89792},
  {area:'걸매리', no:'1181-6', name:'한성공업사', addr:'인주면 현대로 1181-6', lat:36.87232, lng:126.89745},
  {area:'걸매리', no:'1181-5', name:'코리아용접', addr:'인주면 현대로 1181-5', lat:36.87263, lng:126.89705},
  {area:'걸매리', no:'1209-41', name:'폐가', addr:'인주면 현대로 1209-41', lat:36.87305, lng:126.89652},
  {area:'걸매리', no:'1209-40', name:'동화마루 창고', addr:'인주면 현대로 1209-40', lat:36.87335, lng:126.89602},
  {area:'걸매리', no:'1231', name:'금문산업', addr:'인주면 현대로 1231', lat:36.87405, lng:126.89530}
];
let idx = Number(localStorage.getItem('visit_idx_v3') || 0);
let records = JSON.parse(localStorage.getItem('visit_records_v3') || '{}');
let map, houseMarker, meMarker, line, userPos=null, watchId=null;

function init(){
  map = L.map('map').setView([houses[idx].lat, houses[idx].lng], 17);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19, attribution:'© OpenStreetMap'}).addTo(map);
  houseMarker = L.marker([houses[idx].lat, houses[idx].lng]).addTo(map);
  render();
}
function render(){
  const h=houses[idx];
  document.getElementById('areaName').textContent=h.area;
  document.getElementById('houseNo').textContent=h.no;
  document.getElementById('houseName').textContent=h.name;
  document.getElementById('address').textContent=h.addr;
  document.getElementById('memo').value=records[h.no]?.memo || '';
  houseMarker.setLatLng([h.lat,h.lng]).bindPopup('🏠 '+h.no+'<br>'+h.name).openPopup();
  updateProgress(); updateGpsView();
}
function startGps(){
  if(!navigator.geolocation){alert('이 기기는 GPS를 지원하지 않습니다.');return;}
  if(watchId!==null) navigator.geolocation.clearWatch(watchId);
  watchId = navigator.geolocation.watchPosition(pos=>{
    userPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
    updateGpsView();
  }, err=>alert('위치 허용이 필요합니다. 브라우저 위치 권한을 허용해 주세요.'), {enableHighAccuracy:true, maximumAge:5000, timeout:10000});
}
function updateGpsView(){
  const h=houses[idx];
  if(houseMarker) houseMarker.setLatLng([h.lat,h.lng]);
  if(!userPos){ map.setView([h.lat,h.lng],17); return; }
  if(!meMarker) meMarker=L.circleMarker([userPos.lat,userPos.lng],{radius:9}).addTo(map).bindPopup('📍 내 위치');
  meMarker.setLatLng([userPos.lat,userPos.lng]);
  if(line) map.removeLayer(line);
  line=L.polyline([[userPos.lat,userPos.lng],[h.lat,h.lng]],{weight:4}).addTo(map);
  const d=distance(userPos.lat,userPos.lng,h.lat,h.lng);
  document.getElementById('distance').textContent=d<1000 ? Math.round(d)+'m' : (d/1000).toFixed(1)+'km';
  const b=bearing(userPos.lat,userPos.lng,h.lat,h.lng);
  const dir=dirText(b);
  document.getElementById('direction').textContent=dir.arrow;
  document.getElementById('directionText').textContent=' '+dir.text;
  const bounds=L.latLngBounds([[userPos.lat,userPos.lng],[h.lat,h.lng]]).pad(0.35);
  map.fitBounds(bounds);
  if(d<=30 && navigator.vibrate){navigator.vibrate([200,100,200]);}
}
function setStatus(status){
  const h=houses[idx];
  records[h.no]={status, memo:document.getElementById('memo').value, time:new Date().toLocaleString()};
  localStorage.setItem('visit_records_v3', JSON.stringify(records));
  updateProgress();
  if(confirm(status+' 기록 완료. 다음 집으로 이동할까요?')) nextHouse();
}
function nextHouse(){idx=(idx+1)%houses.length; saveIdx(); render();}
function prevHouse(){idx=(idx-1+houses.length)%houses.length; saveIdx(); render();}
function saveIdx(){localStorage.setItem('visit_idx_v3', idx)}
function updateProgress(){
  const done=houses.filter(h=>records[h.no]?.status).length;
  document.getElementById('progressText').textContent=`진행률 ${done} / ${houses.length}`;
  document.getElementById('barFill').style.width=(done/houses.length*100)+'%';
}
function distance(lat1,lon1,lat2,lon2){
  const R=6371000, toRad=x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function bearing(lat1,lon1,lat2,lon2){
  const toRad=x=>x*Math.PI/180, toDeg=x=>x*180/Math.PI;
  const y=Math.sin(toRad(lon2-lon1))*Math.cos(toRad(lat2));
  const x=Math.cos(toRad(lat1))*Math.sin(toRad(lat2))-Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(toRad(lon2-lon1));
  return (toDeg(Math.atan2(y,x))+360)%360;
}
function dirText(b){
  const dirs=[['⬆','북쪽'],['↗','북동쪽'],['➡','동쪽'],['↘','남동쪽'],['⬇','남쪽'],['↙','남서쪽'],['⬅','서쪽'],['↖','북서쪽']];
  return {arrow:dirs[Math.round(b/45)%8][0], text:dirs[Math.round(b/45)%8][1]};
}
function openNaverMap(){
  const h=houses[idx];
  window.open(`https://map.naver.com/v5/search/${encodeURIComponent(h.addr)}`,'_blank');
}
function toggleMenu(){document.getElementById('menu').classList.toggle('open')}
function resetToday(){if(confirm('오늘 기록을 모두 지울까요?')){records={};localStorage.removeItem('visit_records_v3');updateProgress();render();}}
function summaryText(){
  const counts={}; Object.values(records).forEach(r=>counts[r.status]=(counts[r.status]||0)+1);
  return Object.entries(counts).map(([k,v])=>`${k}: ${v}`).join('\n') || '기록 없음';
}
window.onload=init;
</script>
</body>
</html>
