<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>인주회중 야외봉사기록</title>

<style>
:root{
  --navy:#12324a;
  --ink:#111827;
  --muted:#5b6773;
  --line:#d9e1e8;
  --bg:#ffffff;
  --soft:#f6f8fa;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",Arial,sans-serif;
}

.screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px 20px;
}

.card{
  width:100%;
  max-width:430px;
  text-align:center;
  border:1px solid var(--line);
  border-radius:22px;
  padding:34px 24px;
  background:#fff;
  box-shadow:0 10px 28px rgba(18,50,74,0.08);
}

.congregation{
  font-size:26px;
  font-weight:700;
  color:var(--navy);
  letter-spacing:-0.3px;
  margin-bottom:6px;
}

.app-title{
  font-size:30px;
  font-weight:800;
  color:var(--navy);
  letter-spacing:-0.5px;
  margin-bottom:28px;
}

.divider{
  width:54px;
  height:2px;
  background:var(--navy);
  margin:0 auto 26px;
  opacity:.5;
}

.verse{
  font-size:18px;
  line-height:1.85;
  font-weight:500;
  word-break:keep-all;
  margin:0 auto 18px;
}

.ref{
  font-size:17px;
  color:var(--muted);
  font-weight:700;
}

.hint{
  margin-top:30px;
  font-size:14px;
  color:var(--muted);
}

#main{
  display:none;
}

.menu-title{
  font-size:28px;
  font-weight:800;
  color:var(--navy);
  margin-bottom:24px;
}

.menu-sub{
  font-size:15px;
  color:var(--muted);
  margin-bottom:26px;
}

.menu-button{
  width:100%;
  border:1px solid var(--line);
  background:var(--soft);
  color:var(--ink);
  font-size:21px;
  font-weight:700;
  padding:18px 16px;
  border-radius:16px;
  margin:10px 0;
  cursor:pointer;
}

.menu-button:active{
  transform:scale(.99);
}

.fade-out{
  animation:fadeOut .55s ease forwards;
}

.fade-in{
  animation:fadeIn .55s ease forwards;
}

@keyframes fadeOut{
  from{opacity:1;}
  to{opacity:0;}
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@media (max-width:380px){
  .card{padding:30px 18px;}
  .app-title{font-size:27px;}
  .verse{font-size:17px;}
}
</style>
</head>

<body>

<!-- 시작 화면 -->
<section id="splash" class="screen">
  <div class="card">
    <div class="congregation">인주회중</div>
    <div class="app-title">야외봉사기록</div>

    <div class="divider"></div>

    <p class="verse">
      “그리고 이 왕국의 좋은 소식이 모든 민족에게 증거되기 위해
      사람이 거주하는 온 땅에 전파될 것입니다.
      그리고 끝이 올 것입니다.”
    </p>

    <div class="ref">— 마태복음 24:14</div>

    <div class="hint">잠시 후 시작됩니다</div>
  </div>
</section>

<!-- 메인 첫 화면 -->
<section id="main" class="screen">
  <div class="card">
    <div class="menu-title">인주회중 야외봉사기록</div>
    <div class="menu-sub">오늘 봉사를 선택해 주세요</div>

    <button class="menu-button">구역 방문</button>
    <button class="menu-button">전시대</button>
    <button class="menu-button">오늘 참여</button>
    <button class="menu-button">관리자</button>
  </div>
</section>

<script>
setTimeout(function(){
  const splash = document.getElementById("splash");
  const main = document.getElementById("main");

  splash.classList.add("fade-out");

  setTimeout(function(){
    splash.style.display = "none";
    main.style.display = "flex";
    main.classList.add("fade-in");
  }, 550);
}, 3000);
</script>

</body>
</html>
